[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "S"]
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
# assert y "test-secret" son idiomáticos en pytest
"backend/tests/*.py" = ["S101", "S105"]
# sh_token_url es una URL de OAuth CDSE, no una contraseña
"backend/services/sentinel.py" = ["S105"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
